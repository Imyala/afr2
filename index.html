<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b7a43" />
  <meta name="description" content="MzansiLingo — learn real South African languages offline. Built for classrooms with spaced repetition for real, measurable progress." />
  <title>MzansiLingo — Learn South African Languages</title>
  <!-- Apply the saved appearance (light/dark/system) before styles paint so
       there's no flash of the wrong theme. Kept in sync by app.js. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ml_theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main id="app" class="app">
    <div class="screen screen--center"><p class="muted">Loading MzansiLingo…</p></div>
  </main>
  <!-- screen-reader live region: announces screen changes and answer feedback -->
  <div id="srLive" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
